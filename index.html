<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チョコ検 クイズアプリ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
.screen { display: none; padding: 1.5rem 1rem; max-width: 480px; margin: 0 auto; }
.screen.active { display: block; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.25rem; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
button { font-family: inherit; cursor: pointer; border-radius: 8px; font-size: 15px; transition: background 0.15s, transform 0.1s; }
button:active { transform: scale(0.98); }
.btn-primary { background: #2563eb; color: #fff; border: none; padding: 0.75rem 1.5rem; width: 100%; font-weight: 500; border-radius: 10px; }
.btn-primary:hover { background: #1d4ed8; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: transparent; border: 0.5px solid #aaa; color: #1a1a18; padding: 0.65rem 1.25rem; border-radius: 10px; }
.btn-ghost:hover { background: #eee; }
.chapter-btn { width: 100%; text-align: left; background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 0.9rem 1.1rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; color: #1a1a18; font-size: 15px; }
.chapter-btn.selected { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
.chapter-btn .badge { font-size: 12px; background: #f0f0ee; border-radius: 20px; padding: 2px 10px; color: #666; }
.chapter-btn.selected .badge { background: #2563eb; color: #fff; }
.num-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
.num-btn { flex: 1; padding: 0.6rem 0; background: #fff; border: 0.5px solid #ddd; border-radius: 8px; color: #1a1a18; font-size: 14px; }
.num-btn.selected { border-color: #2563eb; background: #eff6ff; color: #2563eb; font-weight: 500; }
.diff-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
.diff-btn { flex: 1; padding: 0.7rem 0; background: #fff; border: 0.5px solid #ddd; border-radius: 8px; color: #1a1a18; font-size: 14px; text-align: center; }
.diff-btn.selected-medium { border-color: #2563eb; background: #eff6ff; color: #2563eb; font-weight: 500; }
.diff-btn.selected-hard { border-color: #dc2626; background: #fef2f2; color: #dc2626; font-weight: 500; }
.diff-btn.selected-mix { border-color: #7c3aed; background: #f5f3ff; color: #7c3aed; font-weight: 500; }
.section-label { font-size: 13px; color: #666; margin-bottom: 0.5rem; margin-top: 1rem; }
.progress-bar-wrap { background: #e5e5e0; border-radius: 99px; height: 6px; margin-bottom: 1.25rem; }
.progress-bar { background: #2563eb; height: 6px; border-radius: 99px; transition: width 0.3s; }
.q-count { font-size: 13px; color: #666; margin-bottom: 0.5rem; }
.q-text { font-size: 17px; font-weight: 500; line-height: 1.6; margin-bottom: 1.25rem; }
.q-type-badge { display: inline-block; font-size: 11px; border-radius: 20px; padding: 2px 10px; margin-bottom: 0.75rem; background: #fef2f2; color: #dc2626; border: 0.5px solid #fca5a5; }
.choice-btn { width: 100%; text-align: left; background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 0.85rem 1.1rem; margin-bottom: 0.6rem; color: #1a1a18; font-size: 15px; line-height: 1.5; display: flex; gap: 10px; align-items: flex-start; }
.choice-btn .key { font-weight: 500; min-width: 20px; color: #888; }
.choice-btn:hover:not(:disabled) { background: #f5f4f0; }
.choice-btn.correct { border-color: #16a34a; background: #f0fdf4; color: #15803d; }
.choice-btn.correct .key { color: #15803d; }
.choice-btn.wrong { border-color: #dc2626; background: #fef2f2; color: #b91c1c; }
.choice-btn.wrong .key { color: #b91c1c; }
.choice-btn:disabled { cursor: default; }
.explanation { background: #f5f4f0; border-left: 3px solid #2563eb; border-radius: 0 8px 8px 0; padding: 0.85rem 1rem; margin-top: 0.75rem; font-size: 14px; line-height: 1.6; color: #555; display: none; }
.explanation.show { display: block; }
.next-wrap { margin-top: 1rem; display: none; }
.next-wrap.show { display: block; }
.result-score { font-size: 48px; font-weight: 500; color: #2563eb; text-align: center; margin: 1.5rem 0 0.25rem; }
.result-label { text-align: center; font-size: 14px; color: #666; margin-bottom: 1.5rem; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.stat-card { background: #f0f0ee; border-radius: 8px; padding: 0.75rem 1rem; }
.stat-card .s-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-card .s-val { font-size: 22px; font-weight: 500; }
.history-section { margin-top: 1.5rem; }
.history-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 0.5px solid #ddd; font-size: 14px; }
.history-item:last-child { border-bottom: none; }
.tag { font-size: 12px; border-radius: 20px; padding: 2px 10px; }
.tag-pass { background: #f0fdf4; color: #15803d; }
.tag-fail { background: #fef2f2; color: #b91c1c; }
.loading { text-align: center; padding: 3rem 1rem; color: #666; font-size: 15px; }
.loading-spinner { font-size: 32px; display: block; margin-bottom: 1rem; animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.error-box { background: #fef2f2; border: 0.5px solid #fca5a5; border-radius: 10px; padding: 1rem 1.25rem; color: #b91c1c; font-size: 14px; line-height: 1.6; margin-bottom: 1rem; }
.badge-section { margin-top: 1.5rem; }
.badge-section-title { font-size: 13px; color: #666; margin-bottom: 0.6rem; }
.badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
.badge-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0.6rem 0.25rem; background: #fff; border-radius: 10px; border: 0.5px solid #ddd; }
.badge-item.earned { background: #fffbeb; border-color: #fcd34d; }
.badge-item.earned-new { background: #fffbeb; border-color: #f59e0b; animation: pop 0.4s ease; }
.badge-item.locked { opacity: 0.35; filter: grayscale(1); }
@keyframes pop { 0%{transform:scale(0.7);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
.badge-icon { font-size: 24px; line-height: 1; }
.badge-name { font-size: 10px; color: #555; text-align: center; line-height: 1.3; }
.badge-item.earned .badge-name, .badge-item.earned-new .badge-name { color: #92400e; font-weight: 500; }
.daily-badge-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 0.75rem; }
.daily-badge-item { display: flex; align-items: center; gap: 10px; padding: 0.7rem 0.9rem; background: #fff; border-radius: 10px; border: 0.5px solid #ddd; }
.daily-badge-item.earned { background: #fffbeb; border-color: #fcd34d; }
.daily-badge-item.earned-new { background: #fffbeb; border-color: #f59e0b; animation: pop 0.4s ease; }
.daily-badge-item.locked { opacity: 0.35; filter: grayscale(1); }
.daily-badge-icon { font-size: 22px; }
.daily-badge-info { flex: 1; }
.daily-badge-name { font-size: 12px; font-weight: 500; color: #333; }
.daily-badge-item.earned .daily-badge-name, .daily-badge-item.earned-new .daily-badge-name { color: #92400e; }
.daily-badge-desc { font-size: 11px; color: #888; margin-top: 1px; }
.daily-count { font-size: 11px; color: #f59e0b; font-weight: 500; margin-top: 2px; }
</style>
</head>
<body>

<div id="screen-loading" class="screen active">
  <div class="loading">
    <span class="loading-spinner">🍫</span>
    問題を読み込んでいます...
  </div>
</div>

<div id="screen-setup" class="screen">
  <h1>チョコ検</h1>
  <p class="subtitle">章と難易度・問題数を選んでください</p>
  <div id="error-area"></div>
  <p class="section-label">難易度</p>
  <div class="diff-row">
    <button class="diff-btn" id="diff-medium" onclick="selectDiff('medium')">📝 標準</button>
    <button class="diff-btn" id="diff-hard" onclick="selectDiff('hard')">🔥 上級</button>
    <button class="diff-btn" id="diff-mix" onclick="selectDiff('mix')">⚡ ミックス</button>
  </div>
  <p class="section-label">出題範囲</p>
  <button class="chapter-btn" id="btn-all-chapters" onclick="toggleAllChapters()">
    <span>全章混合</span><span class="badge" id="badge-all">0問</span>
  </button>
  <div id="chapter-list"></div>
  <p class="section-label">問題数</p>
  <div class="num-row" id="num-row"></div>
  <button class="btn-primary" onclick="startQuiz()">クイズを始める</button>
</div>

<div id="screen-quiz" class="screen">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="q-count" id="q-count"></div>
  <div id="q-type-area"></div>
  <div class="q-text" id="q-text"></div>
  <div id="choices"></div>
  <div class="explanation" id="explanation"></div>
  <div class="next-wrap" id="next-wrap">
    <button class="btn-primary" id="btn-next" onclick="nextQuestion()">次の問題</button>
  </div>
</div>

<div id="screen-result" class="screen">
  <h1>結果</h1>
  <div class="result-score" id="result-score"></div>
  <div class="result-label" id="result-label"></div>
  <div class="stat-grid">
    <div class="stat-card"><div class="s-label">正解数</div><div class="s-val" id="stat-correct" style="color:#15803d"></div></div>
    <div class="stat-card"><div class="s-label">不正解数</div><div class="s-val" id="stat-wrong" style="color:#b91c1c"></div></div>
  </div>
  <div class="badge-section">
    <div class="badge-section-title">☀️ デイリーバッジ</div>
    <div class="daily-badge-grid" id="daily-badge-grid"></div>
  </div>
  <div class="badge-section">
    <div class="badge-section-title">🏅 獲得バッジ</div>
    <div class="badge-grid" id="badge-grid"></div>
  </div>
  <div class="history-section" id="history-section"></div>
  <div style="margin-top:1.25rem;display:flex;gap:10px;">
    <button class="btn-ghost" style="flex:1" onclick="goSetup()">もう一度</button>
    <button class="btn-primary" style="flex:1" onclick="goSetup()">章を変える</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

const JSON_FILES = [
  { file: 'quiz_第1章_medium.json', chapter: '第1章', difficulty: 'medium' },
  { file: 'quiz_第2章_medium.json', chapter: '第2章', difficulty: 'medium' },
  { file: 'quiz_第3章_medium.json', chapter: '第3章', difficulty: 'medium' },
  { file: 'quiz_第4章_medium.json', chapter: '第4章', difficulty: 'medium' },
  { file: 'quiz_第5章_medium.json', chapter: '第5章', difficulty: 'medium' },
  { file: 'quiz_第6章_medium.json', chapter: '第6章', difficulty: 'medium' },
  { file: 'quiz_第1章_hard.json', chapter: '第1章', difficulty: 'hard' },
  { file: 'quiz_第2章_hard.json', chapter: '第2章', difficulty: 'hard' },
  { file: 'quiz_第3章_hard.json', chapter: '第3章', difficulty: 'hard' },
  { file: 'quiz_第4章_hard.json', chapter: '第4章', difficulty: 'hard' },
  { file: 'quiz_第5章_hard.json', chapter: '第5章', difficulty: 'hard' },
  { file: 'quiz_第6章_hard.json', chapter: '第6章', difficulty: 'hard' },
];

const BADGES = [
  { id: 'first',    icon: '🍫', name: 'チョコ入門',    desc: '初回クイズ完了' },
  { id: 'pass70',   icon: '⭐', name: '合格ライン',    desc: '正答率70%以上' },
  { id: 'master',   icon: '🥇', name: 'チョコマスター', desc: '正答率90%以上' },
  { id: 'perfect',  icon: '💯', name: 'パーフェクト',   desc: '全問正解' },
  { id: 'allchap',  icon: '🔥', name: '全章制覇',      desc: '全6章で出題' },
  { id: 'study30',  icon: '📚', name: '猛勉強',        desc: '30問以上クリア' },
  { id: 'streak10', icon: '🎯', name: '連続正解',      desc: '10問連続正解' },
  { id: 'hardclear',icon: '💎', name: '上級制覇',      desc: '上級モードで70%以上' },
];

const DAILY_BADGES = [
  { id: 'daily_challenge', icon: '☀️', name: '今日のチャレンジ', desc: '本日 正答率80%以上' },
  { id: 'daily_perfect',   icon: '🌟', name: 'デイリーパーフェクト', desc: '本日 全問正解' },
];

// allQuestions[chapter][difficulty] = questions[]
let allQuestions = {};
let selectedChapters = new Set();
let allSelected = true;
let selectedDiff = 'medium';
let numQuestions = 10;
let quizQueue = [];
let currentIdx = 0;
let correctCount = 0;
let sessionHistory = [];
let consecutiveCorrect = 0;
let maxConsecutive = 0;

const NUM_OPTIONS = [5, 10, 20, 30];
const KEYS = ['A', 'B', 'C', 'D'];
const TOTAL_CHAPTERS = 6;
const LS_BADGES = 'chocoken_badges';
const LS_DAILY  = 'chocoken_daily';

function today() { return new Date().toISOString().slice(0, 10); }
function loadBadges() { try { return JSON.parse(localStorage.getItem(LS_BADGES)) || {}; } catch { return {}; } }
function saveBadges(d) { localStorage.setItem(LS_BADGES, JSON.stringify(d)); }
function loadDaily() { try { return JSON.parse(localStorage.getItem(LS_DAILY)) || {}; } catch { return {}; } }
function saveDaily(d) { localStorage.setItem(LS_DAILY, JSON.stringify(d)); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo(0, 0);
}

async function loadAllJSON() {
  const errors = [];
  for (const entry of JSON_FILES) {
    try {
      const res = await fetch(entry.file);
      if (!res.ok) throw new Error(`${res.status}`);
      const data = await res.json();
      if (data.questions && data.chapter) {
        if (!allQuestions[data.chapter]) allQuestions[data.chapter] = {};
        allQuestions[data.chapter][entry.difficulty] = data.questions;
      }
    } catch (e) {
      errors.push(entry.file);
    }
  }
  return errors;
}

async function init() {
  const errors = await loadAllJSON();
  if (Object.keys(allQuestions).length === 0) {
    $('error-area').innerHTML = `<div class="error-box">JSONファイルが読み込めませんでした。index.htmlと同じフォルダにJSONファイルが置かれているか確認してください。</div>`;
  } else if (errors.length > 0) {
    $('error-area').innerHTML = `<div class="error-box">一部ファイルが読み込めませんでした：${errors.join(', ')}</div>`;
  }
  selectDiff('medium');
  buildSetupScreen();
  showScreen('screen-setup');
}

function selectDiff(diff) {
  selectedDiff = diff;
  ['medium','hard','mix'].forEach(d => {
    $(`diff-${d}`).className = 'diff-btn' + (d === diff ? ` selected-${d}` : '');
  });
  buildSetupScreen();
}

function getQuestionsForDiff(chapter, diff) {
  const chData = allQuestions[chapter] || {};
  if (diff === 'medium') return chData['medium'] || [];
  if (diff === 'hard')   return chData['hard']   || [];
  if (diff === 'mix') {
    const m = (chData['medium'] || []).map(q => ({...q, _diff: 'medium'}));
    const h = (chData['hard']   || []).map(q => ({...q, _diff: 'hard'}));
    return [...m, ...h];
  }
  return [];
}

function buildSetupScreen() {
  const chapters = Object.keys(allQuestions).sort();
  const total = chapters.reduce((s, c) => s + getQuestionsForDiff(c, selectedDiff).length, 0);
  $('badge-all').textContent = total + '問';
  $('btn-all-chapters').classList.toggle('selected', allSelected);

  const list = $('chapter-list');
  list.innerHTML = '';
  chapters.forEach(ch => {
    const count = getQuestionsForDiff(ch, selectedDiff).length;
    const btn = document.createElement('button');
    btn.className = 'chapter-btn' + (selectedChapters.has(ch) ? ' selected' : '');
    btn.id = 'ch-btn-' + ch;
    btn.innerHTML = `<span>${ch}</span><span class="badge">${count}問</span>`;
    btn.onclick = () => toggleChapter(ch);
    list.appendChild(btn);
  });

  const numRow = $('num-row');
  numRow.innerHTML = '';
  NUM_OPTIONS.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'num-btn' + (n === numQuestions ? ' selected' : '');
    btn.textContent = n + '問';
    btn.onclick = () => selectNum(n);
    numRow.appendChild(btn);
  });
}

function toggleAllChapters() {
  allSelected = !allSelected;
  $('btn-all-chapters').classList.toggle('selected', allSelected);
  if (allSelected) {
    selectedChapters.clear();
    document.querySelectorAll('.chapter-btn[id^="ch-btn-"]').forEach(b => b.classList.remove('selected'));
  }
}

function toggleChapter(ch) {
  allSelected = false;
  $('btn-all-chapters').classList.remove('selected');
  if (selectedChapters.has(ch)) { selectedChapters.delete(ch); $('ch-btn-' + ch).classList.remove('selected'); }
  else { selectedChapters.add(ch); $('ch-btn-' + ch).classList.add('selected'); }
}

function selectNum(n) {
  numQuestions = n;
  document.querySelectorAll('.num-btn').forEach((b, i) => b.classList.toggle('selected', NUM_OPTIONS[i] === n));
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuizPool(chapters, num, diff) {
  const pools = chapters.map(ch => shuffleArray(getQuestionsForDiff(ch, diff).map(q => ({ ...q, chapter: ch }))));
  const result = [];
  let i = 0;
  while (result.length < num) {
    const pool = pools[i % pools.length];
    const taken = Math.floor(result.length / pools.length);
    if (pool[taken]) result.push(pool[taken]);
    i++;
    if (i >= pools.length * Math.ceil(num / pools.length)) break;
  }
  return shuffleArray(result).slice(0, num);
}

function startQuiz() {
  const chapters = allSelected ? Object.keys(allQuestions) : Array.from(selectedChapters);
  if (chapters.length === 0) { alert('章を選んでください'); return; }
  quizQueue = buildQuizPool(chapters, numQuestions, selectedDiff);
  currentIdx = 0; correctCount = 0; consecutiveCorrect = 0; maxConsecutive = 0; sessionHistory = [];
  showQuestion();
  showScreen('screen-quiz');
}

function buildShuffledChoices(q) {
  const orig = KEYS.map(k => ({ key: k, text: q.choices[k] }));
  const shuffled = shuffleArray(orig);
  const newChoices = {}; let newAnswer = '';
  shuffled.forEach((item, i) => {
    newChoices[KEYS[i]] = item.text;
    if (item.key === q.answer) newAnswer = KEYS[i];
  });
  return { choices: newChoices, answer: newAnswer };
}

function showQuestion() {
  const q = quizQueue[currentIdx];
  const total = quizQueue.length;
  $('progress-bar').style.width = (currentIdx / total * 100) + '%';
  $('q-count').textContent = `${currentIdx + 1} / ${total}問　${q.chapter}`;

  // 上級問題タイプバッジ表示
  const typeArea = $('q-type-area');
  if (q.type && q.type !== 'standard') {
    const labels = { 'タイプ1': '❌ 誤り選択型', 'タイプ2': '🔍 紛らわしい選択肢型', 'タイプ3': '📝 要約・言い換え型' };
    typeArea.innerHTML = `<span class="q-type-badge">${labels[q.type] || q.type}</span>`;
  } else {
    typeArea.innerHTML = '';
  }

  $('q-text').textContent = q.question;
  const { choices, answer } = buildShuffledChoices(q);
  q._shuffledAnswer = answer;

  const choicesEl = $('choices');
  choicesEl.innerHTML = '';
  KEYS.forEach(k => {
    if (!choices[k]) return;
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="key">${k}</span><span>${choices[k]}</span>`;
    btn.onclick = () => selectAnswer(k, answer, q.explanation);
    choicesEl.appendChild(btn);
  });

  $('explanation').className = 'explanation';
  $('next-wrap').className = 'next-wrap';
  $('btn-next').textContent = currentIdx < quizQueue.length - 1 ? '次の問題' : '結果を見る';
}

function selectAnswer(selected, answer, explanation) {
  $('choices').querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    const k = btn.querySelector('.key').textContent;
    if (k === answer) btn.classList.add('correct');
    else if (k === selected && selected !== answer) btn.classList.add('wrong');
  });
  const isCorrect = selected === answer;
  if (isCorrect) { correctCount++; consecutiveCorrect++; if (consecutiveCorrect > maxConsecutive) maxConsecutive = consecutiveCorrect; }
  else { consecutiveCorrect = 0; }
  sessionHistory.push({ question: quizQueue[currentIdx].question, correct: isCorrect, chapter: quizQueue[currentIdx].chapter });
  const expEl = $('explanation');
  expEl.textContent = (isCorrect ? '✓ 正解！　' : '✗ 不正解　') + explanation;
  expEl.className = 'explanation show';
  $('next-wrap').className = 'next-wrap show';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= quizQueue.length) showResult();
  else showQuestion();
}

function evaluateBadges(pct, total, chapters) {
  const earned = loadBadges(); const newlyEarned = new Set();
  function grant(id) { if (!earned[id]) { earned[id] = true; newlyEarned.add(id); } }
  grant('first');
  if (pct >= 70) grant('pass70');
  if (pct >= 90) grant('master');
  if (pct === 100) grant('perfect');
  if (chapters.length >= TOTAL_CHAPTERS) grant('allchap');
  if (total >= 30) grant('study30');
  if (maxConsecutive >= 10) grant('streak10');
  if (selectedDiff === 'hard' && pct >= 70) grant('hardclear');
  saveBadges(earned);
  return { earned, newlyEarned };
}

function evaluateDailyBadges(pct) {
  const daily = loadDaily(); const t = today();
  if (!daily[t]) daily[t] = {};
  const newlyEarned = new Set();
  if (pct >= 80 && !daily[t]['daily_challenge']) { daily[t]['daily_challenge'] = true; newlyEarned.add('daily_challenge'); }
  if (pct === 100 && !daily[t]['daily_perfect']) { daily[t]['daily_perfect'] = true; newlyEarned.add('daily_perfect'); }
  saveDaily(daily);
  const counts = {};
  DAILY_BADGES.forEach(b => counts[b.id] = 0);
  Object.values(daily).forEach(dd => { DAILY_BADGES.forEach(b => { if (dd[b.id]) counts[b.id]++; }); });
  return { todayData: daily[t], newlyEarned, counts };
}

function renderBadges(earned, newlyEarned) {
  const grid = $('badge-grid'); grid.innerHTML = '';
  BADGES.forEach(b => {
    const isEarned = earned[b.id]; const isNew = newlyEarned.has(b.id);
    const div = document.createElement('div');
    div.className = 'badge-item ' + (isNew ? 'earned-new' : isEarned ? 'earned' : 'locked');
    div.innerHTML = `<span class="badge-icon">${b.icon}</span><span class="badge-name">${b.name}</span>`;
    div.title = b.desc;
    grid.appendChild(div);
  });
}

function renderDailyBadges(todayData, newlyEarned, counts) {
  const grid = $('daily-badge-grid'); grid.innerHTML = '';
  DAILY_BADGES.forEach(b => {
    const isEarned = todayData && todayData[b.id]; const isNew = newlyEarned.has(b.id);
    const div = document.createElement('div');
    div.className = 'daily-badge-item ' + (isNew ? 'earned-new' : isEarned ? 'earned' : 'locked');
    div.innerHTML = `<span class="daily-badge-icon">${b.icon}</span><div class="daily-badge-info"><div class="daily-badge-name">${b.name}</div><div class="daily-badge-desc">${b.desc}</div>${counts[b.id] > 0 ? `<div class="daily-count">通算 ${counts[b.id]}日達成</div>` : ''}</div>`;
    grid.appendChild(div);
  });
}

function showResult() {
  const total = quizQueue.length;
  const pct = Math.round(correctCount / total * 100);
  $('result-score').textContent = pct + '%';
  $('stat-correct').textContent = correctCount + '問';
  $('stat-wrong').textContent = (total - correctCount) + '問';
  let msg = pct >= 90 ? '素晴らしい！ほぼ完璧です🎉' : pct >= 70 ? 'よくできました！もう少しで満点' : pct >= 50 ? 'まずまずです。復習してみましょう' : '復習して再チャレンジ！';
  $('result-label').textContent = `${total}問中 ${correctCount}問正解　${msg}`;
  const chapters = allSelected ? Object.keys(allQuestions) : Array.from(selectedChapters);
  const { earned, newlyEarned } = evaluateBadges(pct, total, chapters);
  const { todayData, newlyEarned: dailyNew, counts } = evaluateDailyBadges(pct);
  renderDailyBadges(todayData, dailyNew, counts);
  renderBadges(earned, newlyEarned);
  const hist = $('history-section');
  hist.innerHTML = '<div style="font-size:13px;color:#666;margin-bottom:0.5rem;margin-top:1rem;">今回の記録</div>';
  sessionHistory.forEach((h, i) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `<span style="flex:1;font-size:13px;padding-right:8px">Q${i+1}. ${h.question.slice(0,30)}${h.question.length>30?'…':''}</span><span class="tag ${h.correct?'tag-pass':'tag-fail'}">${h.correct?'正解':'不正解'}</span>`;
    hist.appendChild(div);
  });
  showScreen('screen-result');
}

function goSetup() {
  sessionHistory = [];
  buildSetupScreen();
  showScreen('screen-setup');
}

init();
</script>
</body>
